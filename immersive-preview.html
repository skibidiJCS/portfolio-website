<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jiacai Song | Immersive Concepts</title>
    <link rel="stylesheet" href="immersive-preview.css" />
  </head>
  <body>
    <main>
      <section class="cloud-study preview-section">
        <div class="cloud-stage">
          <div class="preview-heading light-heading">
            <span>01</span>
            <h1>Above the landscape.</h1>
          </div>
          <div class="mountain-frame">
            <div class="mountain-layer mountain-sky" aria-hidden="true"></div>
            <div class="mountain-layer mountain-land" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="project-depth preview-section">
        <div class="project-stage">
          <div class="preview-heading dark-heading">
            <span>02</span>
            <h2>Built in layers.</h2>
          </div>
          <div class="depth-stack">
            <article class="depth-card depth-card-one">
              <img src="assets/marihacks-ix-gemma.jpg" alt="MariHacks winners" />
              <div><span>Hackathon</span><strong>MariHacks IX</strong></div>
            </article>
            <article class="depth-card depth-card-two">
              <img src="assets/optimath-finalist.jpg" alt="Optimath finalist certificate" />
              <div><span>Mathematics</span><strong>Optimath</strong></div>
            </article>
            <article class="depth-card depth-card-three">
              <img src="assets/expo-sciences.jpg" alt="Expo-sciences project" />
              <div><span>Science</span><strong>Expo-sciences</strong></div>
            </article>
          </div>
        </div>
      </section>

      <section class="counter-study preview-section">
        <div class="counter-inner">
          <div class="preview-heading light-heading">
            <span>03</span>
            <h2>Years in motion.</h2>
          </div>
          <div class="counter-grid">
            <article class="counter-card" data-year="2023">
              <p>AQJM</p>
              <div class="counter-year" aria-label="2023"></div>
            </article>
            <article class="counter-card" data-year="2024">
              <p>CYCC</p>
              <div class="counter-year" aria-label="2024"></div>
            </article>
            <article class="counter-card" data-year="2025">
              <p>NAYCC</p>
              <div class="counter-year" aria-label="2025"></div>
            </article>
          </div>
        </div>
      </section>
    </main>
    <script src="immersive-preview.js"></script>
  </body>
</html>
